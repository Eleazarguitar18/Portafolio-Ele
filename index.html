<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/devops.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache" />

    <!-- Back-Forward Cache Optimization -->
    <meta name="pageType" content="portfolio" />
    <meta name="bfcache-opt-in" content="true" />
    
    <!-- Primary Meta Tags -->
    <title>Eleazar Cruz - Full Stack Developer</title>
    <meta name="title" content="Eleazar Cruz - Full Stack Developer">
    <meta name="description" content="Full Stack Developer specializing in modern web development. View my projects and skills in React, Node.js, and more." />
    <meta name="keywords" content="full stack developer, web development, React, Node.js, portfolio">
    <meta name="author" content="Eleazar Cruz">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-portfolio-url.com/">
    <meta property="og:title" content="Eleazar Cruz - Full Stack Developer">
    <meta property="og:description" content="Full Stack Developer specializing in modern web development. View my projects and skills in React, Node.js, and more.">
    <meta property="og:image" content="/path-to-your-preview-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://your-portfolio-url.com/">
    <meta property="twitter:title" content="Eleazar Cruz - Full Stack Developer">
    <meta property="twitter:description" content="Full Stack Developer specializing in modern web development. View my projects and skills in React, Node.js, and more.">
    <meta property="twitter:image" content="/path-to-your-preview-image.jpg">

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#0B1120">
    
    <!-- Accessibility -->
    <link rel="canonical" href="https://your-portfolio-url.com/">
    <meta name="robots" content="index, follow">
    
    <!-- Font Loading Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap">
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
